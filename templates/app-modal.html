<transition name="fade">
  <div class="modal-mask" v-if="show">
    <div class="modal-card">
      <div class="card-header">
        <h3>{{ title }}</h3>
      </div>
      <div class="card-body">
        <p>{{ message }}</p>
        <div class="actions" style="justify-content:flex-end; margin-top:18px;">
          <button class="btn btn-outline" type="button" @click="$emit('cancel')">Batal</button>
          <button class="btn btn-danger" type="button" @click="$emit('confirm')">Ya, hapus</button>
        </div>
      </div>
    </div>
  </div>
</transition>
